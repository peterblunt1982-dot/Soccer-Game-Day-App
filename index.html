<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Redbacks">
<meta name="theme-color" content="#0a0005">
<title>Eltham Redbacks</title>
<link rel="apple-touch-icon" href="https://elthamredbacks.com.au/wp-content/uploads/2025/07/ERvKPLINEUP-1-127x137.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://elthamredbacks.com.au/wp-content/uploads/2025/07/ERvKPLINEUP-1-127x137.png">
<link rel="icon" type="image/png" href="https://elthamredbacks.com.au/wp-content/uploads/2025/07/ERvKPLINEUP-1-127x137.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --red:        #C0001E;
  --red-bright: #ff1a38;
  --red-glow:   rgba(192,0,30,0.4);
  --red-deep:   #0a0005;
  --red-mid:    #6a0012;
  --red-pale:   #f7dde1;
  --glass-white:  rgba(255,255,255,0.07);
  --glass-white2: rgba(255,255,255,0.12);
  --glass-border: rgba(255,255,255,0.14);
  --glass-border2:rgba(255,255,255,0.22);
  --glass-red:    rgba(192,0,30,0.15);
  --glass-red2:   rgba(192,0,30,0.25);
  --black:  #000000;
  --white:  #ffffff;
  --text-primary:   rgba(255,255,255,0.95);
  --text-secondary: rgba(255,255,255,0.55);
  --text-tertiary:  rgba(255,255,255,0.3);
  --content-bg: #0f0208;
  --card-bg: rgba(255,255,255,0.06);
  --card-border: rgba(255,255,255,0.1);
  --green:     #30d158;
  --gold:      #ffd60a;
  --gold-dk:   #8a6a10;
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --ease-out: cubic-bezier(0.16,1,0.3,1);
  --font-body: 'DM Sans', sans-serif;
  --font-display: 'Bebas Neue', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--red-deep);
  min-height: 100vh; min-height: -webkit-fill-available;
  color: var(--text-primary);
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* BACKGROUND ORBS */
.bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.bg-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.35; animation: orbFloat 8s ease-in-out infinite alternate; }
.bg-orb-1 { width: 300px; height: 300px; background: radial-gradient(circle, #C0001E, transparent); top: -100px; right: -80px; animation-duration: 9s; }
.bg-orb-2 { width: 200px; height: 200px; background: radial-gradient(circle, #6a0012, transparent); bottom: 30%; left: -60px; animation-duration: 11s; animation-delay: -3s; }
.bg-orb-3 { width: 150px; height: 150px; background: radial-gradient(circle, rgba(192,0,30,0.6), transparent); top: 40%; right: -40px; animation-duration: 7s; animation-delay: -5s; }
@keyframes orbFloat { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(20px,30px) scale(1.1); } }
body::after { content: ''; position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }

/* LOADING SCREEN */
#loadingScreen { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--red-deep); transition: opacity 0.6s var(--ease-out); }
.loading-logo-wrap { position: relative; width: 120px; height: 120px; margin-bottom: 36px; }
.loading-ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid transparent; border-top-color: var(--red); border-right-color: rgba(192,0,30,0.3); animation: spinRing 1.4s cubic-bezier(0.45,0.05,0.55,0.95) infinite; }
.loading-ring-2 { position: absolute; inset: 6px; border-radius: 50%; border: 1px solid transparent; border-bottom-color: rgba(192,0,30,0.4); animation: spinRing 2s cubic-bezier(0.45,0.05,0.55,0.95) infinite reverse; }
@keyframes spinRing { to { transform: rotate(360deg); } }
.loading-logo-inner { position: absolute; inset: 16px; background: rgba(255,255,255,0.95); border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 0 40px var(--red-glow); animation: logoPulse 2s ease-in-out infinite alternate; }
@keyframes logoPulse { 0% { box-shadow: 0 0 20px var(--red-glow); } 100% { box-shadow: 0 0 50px var(--red-glow), 0 0 80px rgba(192,0,30,0.2); } }
.loading-logo-inner img { width: 62px; height: 62px; object-fit: contain; }
.loading-title { font-family: var(--font-display); font-size: 38px; letter-spacing: 3px; color: var(--white); margin-bottom: 4px; animation: fadeUp 0.8s var(--ease-out) 0.2s both; }
.loading-title span { color: var(--red); }
.loading-subtitle { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 48px; animation: fadeUp 0.8s var(--ease-out) 0.35s both; }
.loading-msg { font-size: 13px; color: var(--text-tertiary); font-weight: 500; animation: fadeUp 0.8s var(--ease-out) 0.5s both; }
.loading-dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
@keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} 100%{content:''} }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

/* MAIN LAYOUT */
#mainApp { display: none; max-width: 430px; margin: 0 auto; position: relative; z-index: 2; padding-bottom: 40px; }

/* HEADER */
.header { padding: 54px 20px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; background: linear-gradient(180deg, rgba(10,0,5,0.95) 0%, rgba(10,0,5,0.8) 80%, transparent 100%); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.header-brand { display: flex; align-items: center; gap: 12px; }
.header-logo { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.95); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; border: 1.5px solid rgba(192,0,30,0.5); box-shadow: 0 0 20px rgba(192,0,30,0.3); }
.header-logo img { width: 32px; height: 32px; object-fit: contain; }
.header-kicker { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-tertiary); font-weight: 600; margin-bottom: 1px; }
.header-title { font-family: var(--font-display); font-size: 20px; letter-spacing: 1px; color: var(--white); line-height: 1; }
.header-title span { color: var(--red); }
.header-stripe { height: 1px; background: linear-gradient(90deg, transparent, rgba(192,0,30,0.5), transparent); margin: 0 20px 20px; }

/* TAB NAV */
.tab-nav { display: flex; gap: 6px; padding: 0 16px; margin-bottom: 16px; }
.tab-btn { flex: 1; padding: 10px 4px; font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: 0.3px; text-align: center; background: var(--glass-white); color: var(--text-tertiary); border: 1px solid var(--glass-border); border-radius: 12px; cursor: pointer; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: all 0.2s var(--ease-out); white-space: nowrap; }
.tab-btn.active { background: linear-gradient(135deg, var(--red), var(--red-mid)); color: var(--white); border-color: transparent; box-shadow: 0 4px 20px rgba(192,0,30,0.35); }
.tab-btn:active { transform: scale(0.95); }

/* CONTENT */
.content { padding: 0 16px 20px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: panelIn 0.3s var(--ease-out); }
@keyframes panelIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.section-label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-tertiary); font-weight: 700; padding: 0 4px 10px; }

/* NEXT MATCH HERO CARD */
.next-match-hero {
  border-radius: 24px; overflow: hidden; margin-bottom: 12px;
  background: linear-gradient(135deg, rgba(192,0,30,0.25) 0%, rgba(106,0,18,0.2) 100%);
  border: 1px solid rgba(192,0,30,0.35);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  box-shadow: 0 8px 40px rgba(192,0,30,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
  animation: cardIn 0.4s var(--ease-out) both;
}
@keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.hero-top { padding: 20px 20px 16px; position: relative; }
.hero-top::before { content: ''; position: absolute; top: -40%; right: -10%; width: 200px; height: 200px; background: radial-gradient(circle, rgba(255,255,255,0.05), transparent); border-radius: 50%; pointer-events: none; }

.nm-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(192,0,30,0.4); border: 1px solid rgba(192,0,30,0.5); border-radius: 20px; padding: 4px 10px; font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.9); margin-bottom: 14px; }

.hero-vs { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.hero-team { flex: 1; }
.hero-team-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.4); font-weight: 600; margin-bottom: 3px; }
.hero-team-name { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.5px; color: var(--white); line-height: 1.1; }
.hero-divider { font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.2); flex-shrink: 0; padding: 0 4px; }

/* TIME ROW */
.hero-time-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding: 12px 14px; background: rgba(0,0,0,0.2); border-radius: 14px; border: 1px solid rgba(255,255,255,0.06); }
.hero-arrive { flex: 1; }
.hero-arrive-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.4); font-weight: 600; margin-bottom: 2px; }
.hero-arrive-val { font-family: var(--font-display); font-size: 28px; letter-spacing: 1px; color: var(--white); line-height: 1; }
.hero-time-divider { width: 1px; background: rgba(255,255,255,0.1); height: 36px; flex-shrink: 0; }
.hero-ko { text-align: right; }
.hero-ko-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.4); font-weight: 600; margin-bottom: 2px; }
.hero-ko-val { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.7); }

/* PILLS */
.hero-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
.hero-pill { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 5px 10px; }
.hero-pill.clickable { cursor: pointer; transition: background 0.15s; }
.hero-pill.clickable:active { background: rgba(255,255,255,0.15); }
.hero-pill-icon { font-size: 11px; }
.hero-pill-text { font-size: 11px; color: rgba(255,255,255,0.75); font-weight: 600; }
.hero-pill.clickable .hero-pill-text { text-decoration: underline; text-underline-offset: 2px; }

/* EMBEDDED MAP */
.hero-map {
  width: 100%; height: 220px;
  border: none; display: block;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.map-loading {
  height: 220px; background: rgba(0,0,0,0.3);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; color: var(--text-tertiary); font-size: 13px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.map-open-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 13px 20px; margin: 12px 20px 20px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px; cursor: pointer;
  font-family: var(--font-body); font-size: 13px; font-weight: 700;
  color: var(--white); text-decoration: none;
  transition: background 0.15s var(--spring);
}
.map-open-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.98); }

.no-match-card { border-radius: 24px; padding: 40px 24px; text-align: center; background: var(--glass-white); border: 1px solid var(--glass-border); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
.no-match-icon { font-size: 44px; margin-bottom: 14px; }
.no-match-title { font-family: var(--font-display); font-size: 26px; letter-spacing: 1px; color: var(--white); margin-bottom: 8px; }
.no-match-sub { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

/* FIXTURE CARDS */
.fixture-list { display: flex; flex-direction: column; gap: 10px; }
.fixture-card { border-radius: 20px; padding: 16px 18px; background: var(--glass-white); border: 1px solid var(--glass-border); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.08); animation: cardIn 0.3s var(--ease-out) both; }
.fixture-card.next-game { background: linear-gradient(135deg, rgba(192,0,30,0.18), rgba(106,0,18,0.14)); border-color: rgba(192,0,30,0.3); }
.fixture-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.fixture-date { font-size: 12px; font-weight: 700; color: var(--text-secondary); }
.fixture-badge { font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; background: rgba(192,0,30,0.2); color: var(--red-pale); border: 1px solid rgba(192,0,30,0.25); }
.fixture-badge.next { background: var(--red); color: var(--white); border-color: transparent; }
.fixture-teams { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.fixture-team { flex: 1; }
.fixture-team-label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-tertiary); font-weight: 600; margin-bottom: 2px; }
.fixture-team-name { font-family: var(--font-display); font-size: 17px; letter-spacing: 0.5px; color: var(--white); line-height: 1.1; }
.fixture-vs { font-size: 11px; font-weight: 800; color: var(--text-tertiary); flex-shrink: 0; padding: 0 4px; }
.fixture-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.fixture-pill { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 4px 9px; }
.fixture-pill.clickable { cursor: pointer; }
.fixture-pill.clickable:active { background: rgba(255,255,255,0.12); }
.fixture-pill-icon { font-size: 10px; }
.fixture-pill-text { font-size: 11px; color: rgba(255,255,255,0.65); font-weight: 600; }
.fixture-pill.clickable .fixture-pill-text { text-decoration: underline; text-underline-offset: 2px; }

/* RESULTS */
.results-list { display: flex; flex-direction: column; gap: 10px; }
.result-card { border-radius: 20px; padding: 16px 18px; background: var(--glass-white); border: 1px solid var(--glass-border); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.08); animation: cardIn 0.3s var(--ease-out) both; }
.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.result-date { font-size: 11px; color: var(--text-secondary); font-weight: 600; }
.outcome-badge { font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; }
.outcome-win  { background: rgba(48,209,88,0.15);  color: var(--green); border: 1px solid rgba(48,209,88,0.25); }
.outcome-loss { background: rgba(192,0,30,0.15);   color: #ff453a;      border: 1px solid rgba(192,0,30,0.25); }
.outcome-draw { background: rgba(255,214,10,0.12); color: var(--gold);  border: 1px solid rgba(255,214,10,0.2); }
.result-score-row { display: flex; align-items: center; gap: 12px; }
.result-team { flex: 1; text-align: center; }
.result-team-name { font-size: 11px; color: var(--text-secondary); font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-score-num { font-family: var(--font-display); font-size: 40px; letter-spacing: -1px; color: var(--white); line-height: 1; }
.result-vs-dash { font-size: 18px; font-weight: 900; color: rgba(255,255,255,0.15); flex-shrink: 0; }
.scorer-line { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.08); }
.scorer-goals { font-size: 11px; color: var(--red-pale); font-weight: 600; }

/* STATS */
.sort-row { display: flex; gap: 7px; margin-bottom: 14px; }
.sort-btn { flex: 1; padding: 9px 6px; border-radius: 11px; font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: 0.3px; background: var(--glass-white); color: var(--text-tertiary); border: 1px solid var(--glass-border); cursor: pointer; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); transition: all 0.15s var(--ease-out); }
.sort-btn.active { background: var(--glass-red2); color: var(--red-pale); border-color: rgba(192,0,30,0.3); }
.sort-btn:active { transform: scale(0.95); }
.stats-list { display: flex; flex-direction: column; gap: 8px; }
.stats-card { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 20px; background: var(--glass-white); border: 1px solid var(--glass-border); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.08); animation: cardIn 0.3s var(--ease-out) both; }
.stats-rank { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; flex-shrink: 0; background: rgba(255,255,255,0.07); color: var(--text-tertiary); }
.rank-gold   { background: rgba(255,214,10,0.15); color: var(--gold); }
.rank-silver { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }
.rank-bronze { background: rgba(200,120,50,0.15);  color: #cd7f32; }
.stats-avatar { width: 40px; height: 40px; border-radius: 13px; background: linear-gradient(135deg, rgba(192,0,30,0.6), rgba(80,0,12,0.5)); border: 1px solid rgba(192,0,30,0.3); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: var(--white); flex-shrink: 0; }
.stats-info { flex: 1; min-width: 0; }
.stats-name { font-size: 14px; font-weight: 700; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stats-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
.sg { color: var(--red-pale); font-weight: 600; }
.sa { color: rgba(255,214,10,0.6); font-weight: 600; }
.stats-nums { display: flex; gap: 14px; flex-shrink: 0; }
.stats-num-item { text-align: center; }
.stats-big { font-family: var(--font-display); font-size: 26px; letter-spacing: 1px; line-height: 1; }
.goals-num { color: var(--red-pale); }
.assists-num { color: rgba(255,214,10,0.7); }
.stats-num-label { font-size: 7px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-tertiary); font-weight: 700; margin-top: 2px; }

/* LOADING / EMPTY */
.loading-state { text-align: center; padding: 52px 24px; color: var(--text-tertiary); font-size: 14px; }
.spinner { width: 28px; height: 28px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--red); border-radius: 50%; animation: spinRing 0.75s linear infinite; margin: 0 auto 16px; }
.empty-state { text-align: center; padding: 48px 24px; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { color: var(--text-tertiary); font-size: 14px; line-height: 1.7; }

/* TOAST */
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); padding: 13px 22px; border-radius: 26px; font-size: 13px; font-weight: 600; z-index: 999; white-space: nowrap; pointer-events: none; backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: transform 0.4s var(--spring), opacity 0.3s; background: rgba(30,10,15,0.9); color: var(--white); }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: rgba(10,25,15,0.92); border-color: rgba(48,209,88,0.3); color: var(--green); }
.toast.error { background: rgba(40,5,5,0.92); border-color: rgba(192,0,30,0.3); color: #ff453a; }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

    </div>
  </div>
  <div class="loading-title">ELTHAM <span>REDBACKS</span></div>
  <div class="loading-subtitle">Season Hub</div>

<!-- MAIN APP -->
<div id="mainApp">
  <div class="header">
    <div class="header-brand">
      <div class="header-logo">
        <img src="https://elthamredbacks.com.au/wp-content/uploads/2025/07/ERvKPLINEUP-1-127x137.png" alt="ERFC" onerror="this.parentNode.innerHTML='🕷️'">
      </div>
      <div>
        <div class="header-kicker">Season Hub</div>
        <div class="header-title">ELTHAM <span>REDBACKS</span></div>
      </div>
    </div>
  </div>
  <div class="header-stripe"></div>

  <!-- TABS -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('next')"    id="tab-next">⚽ Next Game</button>
    <button class="tab-btn"        onclick="switchTab('fixture')" id="tab-fixture">🗓 Fixture</button>
    <button class="tab-btn"        onclick="switchTab('results')" id="tab-results">📋 Results</button>
    <button class="tab-btn"        onclick="switchTab('stats')"   id="tab-stats">🏅 Stats</button>
  </div>

  <div class="content">

    <!-- NEXT GAME TAB -->
    <div class="tab-panel active" id="panel-next">
      <div class="section-label">Upcoming Match</div>
      <div id="nextGameContent">
        <div class="loading-state"><div class="spinner"></div>Loading next match…</div>
      </div>
    </div>

    <!-- FIXTURE TAB -->
    <div class="tab-panel" id="panel-fixture">
      <div class="section-label">Upcoming Games</div>
      <div class="fixture-list" id="fixtureList">

    </div>

    <!-- RESULTS TAB -->
    <div class="tab-panel" id="panel-results">
      <div class="section-label">Past Results</div>

    </div>

    <!-- STATS TAB -->
    <div class="tab-panel" id="panel-stats">
      <div class="section-label">Season Totals</div>
      <div class="sort-row">
        <button class="sort-btn active" id="sort-goals"   onclick="sortStats('goals')">⚽ Goals</button>
        <button class="sort-btn"        id="sort-assists" onclick="sortStats('assists')">★ Assists</button>
        <button class="sort-btn"        id="sort-name"    onclick="sortStats('name')">A–Z Name</button>
      </div>
      <div class="stats-list" id="statsList">

      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG — same Script URL as the main app
// ============================================================
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbySGscQoyJLWA0hJQBkEmaeo5TOTaz6cO8P442F-GOLNPpjNIwIIlymZHTwzDlNdSxm/exec';

// ✏️ PASTE YOUR GOOGLE MAPS API KEY HERE:
const MAPS_API_KEY = 'AIzaSyDcQAoB5wlGOzp9kR-YXUbZQMTLa3xIB3M';
// ============================================================

let players       = [];
let cachedResults  = null;
let cachedFixtures = null;
let cachedNext     = null;
let currentSort    = 'goals';

// ============================================================
// INIT
// ============================================================
function init() {
  document.getElementById('mainApp').style.display = 'block';
  setLoadingMsg('Loading');
  let donePlayers = false, doneResults = false, doneFixtures = false, doneNext = false;
  function checkDone() {
    if (donePlayers && doneResults && doneFixtures && doneNext) hideLoadingScreen();
  }
  jsonp(SCRIPT_URL + '?action=getPlayers',    d => { players = (d&&!d.error) ? d.players||[] : []; donePlayers=true; checkDone(); });
  jsonp(SCRIPT_URL + '?action=getResults',    d => { cachedResults = (d&&!d.error) ? d.results||[] : []; doneResults=true; checkDone(); });
  jsonp(SCRIPT_URL + '?action=getAllFixtures', d => { cachedFixtures = (d&&!d.error) ? d.fixtures||[] : []; doneFixtures=true; checkDone(); });
  jsonp(SCRIPT_URL + '?action=getNextMatch',  d => {
    cachedNext = (d&&!d.error) ? d.match||null : null;
    renderNextGame(cachedNext);
    doneNext=true; checkDone();
  });
}

function hideLoadingScreen() {
  const el = document.getElementById('loadingScreen');
  if (!el) return;
  el.style.opacity = '0';
  setTimeout(() => el.style.display = 'none', 600);
}
function setLoadingMsg(msg) { const el = document.getElementById('loadingMsg'); if (el) el.textContent = msg; }

// ============================================================
// TABS
// ============================================================
function switchTab(name) {
  ['next','fixture','results','stats'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
    document.getElementById('panel-' + t).classList.toggle('active', t === name);
  });
  if (name === 'fixture') renderFixtures();
  if (name === 'results') renderResults();
  if (name === 'stats')   renderStats();
}

// ============================================================
// NEXT GAME
// ============================================================
function renderNextGame(match) {
  const el = document.getElementById('nextGameContent');
  if (!match || !match.opponent) {
    el.innerHTML = `<div class="no-match-card">
      <div class="no-match-icon">😴</div>
      <div class="no-match-title">No Upcoming Game</div>
      <div class="no-match-sub">Check back later — there are no scheduled fixtures at the moment.</div>
    </div>`;
    return;
  }

  const dateStr = match.date ? formatDate(match.date, {weekday:'long', day:'numeric', month:'long', year:'numeric'}) : '—';
  const round   = match.round || 'Upcoming Match';
  const redbacksHome = match.home && match.home.toLowerCase().includes('eltham');
  const leftName  = redbacksHome ? 'Eltham Redbacks' : match.opponent;
  const leftLabel = 'Home';
  const rightName  = redbacksHome ? match.opponent : 'Eltham Redbacks';
  const rightLabel = 'Away';
  const venue = match.location || match.address || '';
  const mapsQuery = encodeURIComponent(venue);
  const mapsWebUrl = 'https://www.google.com/maps/search/?api=1&query=' + mapsQuery;

  // Build embed URL — uses address for the most accurate pin
  const mapEmbedUrl = MAPS_API_KEY !== 'YOUR_GOOGLE_MAPS_API_KEY_HERE' && venue
    ? `https://www.google.com/maps/embed/v1/place?key=${MAPS_API_KEY}&q=${mapsQuery}&zoom=15`
    : null;

  el.innerHTML = `
    <div class="next-match-hero">
      <div class="hero-top">
        <div class="nm-badge">🗓 ${round}</div>
        <div class="hero-vs">
          <div class="hero-team">
            <div class="hero-team-label">${leftLabel}</div>
            <div class="hero-team-name">${leftName}</div>
          </div>
          <div class="hero-divider">VS</div>
          <div class="hero-team" style="text-align:right">
            <div class="hero-team-label">${rightLabel}</div>
            <div class="hero-team-name">${rightName}</div>
          </div>
        </div>

        ${(match.arrival || match.kickoff) ? `
        <div class="hero-time-row">
          ${match.arrival ? `<div class="hero-arrive">
            <div class="hero-arrive-label">Arrive By</div>
            <div class="hero-arrive-val">${match.arrival}</div>
          </div>` : ''}
          ${match.arrival && match.kickoff ? '<div class="hero-time-divider"></div>' : ''}
          ${match.kickoff ? `<div class="hero-ko">
            <div class="hero-ko-label">Kick Off</div>
            <div class="hero-ko-val">${match.kickoff}</div>
          </div>` : ''}
        </div>` : ''}

        <div class="hero-pills">
          <div class="hero-pill"><span class="hero-pill-icon">📅</span><span class="hero-pill-text">${dateStr}</span></div>
          <div class="hero-pill"><span class="hero-pill-icon">${redbacksHome?'🏠':'✈️'}</span><span class="hero-pill-text">${redbacksHome?'Home':'Away'}</span></div>
          ${match.fruit    ? `<div class="hero-pill"><span class="hero-pill-icon">🍊</span><span class="hero-pill-text">Fruit: ${match.fruit}</span></div>` : ''}
          ${match.linesman ? `<div class="hero-pill"><span class="hero-pill-icon">🚩</span><span class="hero-pill-text">Linesman: ${match.linesman}</span></div>` : ''}
        </div>

        ${venue ? `<div class="hero-pills" style="margin-top:8px;">
          <div class="hero-pill clickable" onclick="window.open('${mapsWebUrl}','_blank')">
            <span class="hero-pill-icon">📍</span>
            <span class="hero-pill-text">${venue}</span>
          </div>
        </div>` : ''}
      </div>

      ${mapEmbedUrl ? `
        <iframe
          class="hero-map"
          src="${mapEmbedUrl}"
          allowfullscreen
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
        <a href="${mapsWebUrl}" target="_blank" class="map-open-btn">
          <span>🗺</span> Open in Google Maps
        </a>
      ` : venue ? `
        <div class="map-loading">
          <span style="font-size:32px">📍</span>
          <span>${venue}</span>
          <a href="${mapsWebUrl}" target="_blank" style="color:var(--red-pale);font-size:12px;font-weight:700;text-decoration:underline;">Open in Google Maps →</a>
        </div>
      ` : ''}
    </div>`;
}

// ============================================================
// FIXTURE TAB
// ============================================================
function renderFixtures() {
  const list = document.getElementById('fixtureList');
  if (!cachedFixtures) { list.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading…</div>'; return; }
  if (!cachedFixtures.length) { list.innerHTML = '<div class="empty-state"><div class="empty-icon">🗓</div><p>No upcoming fixtures found.</p></div>'; return; }
  let isFirst = true;
  list.innerHTML = cachedFixtures.map((f, i) => {
    const dateStr = f.date ? formatDate(f.date, {weekday:'short', day:'numeric', month:'short'}) : '—';
    if (f.isBye) {
      return `<div class="fixture-card" style="animation-delay:${i*0.04}s;opacity:0.5;">
        <div class="fixture-top">
          <span class="fixture-date">${dateStr}</span>
          <span class="fixture-badge" style="background:rgba(255,255,255,0.07);color:var(--text-tertiary);border-color:rgba(255,255,255,0.07);">No Game</span>
        </div>
        <div style="font-size:13px;color:var(--text-tertiary);font-weight:500;padding:2px 0;">Bye Week</div>
      </div>`;
    }
    const redbacksHome = f.home && f.home.toLowerCase().includes('eltham');
    const leftName  = redbacksHome ? 'Eltham Redbacks' : f.opponent;
    const rightName = redbacksHome ? f.opponent : 'Eltham Redbacks';
    const venue = f.location || f.address || '';
    const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(venue);
    const isNext = isFirst; isFirst = false;
    const timeInfo = [f.arrival ? `🕐 Arrive ${f.arrival}` : '', f.kickoff ? `⚽ KO ${f.kickoff}` : ''].filter(Boolean).join('  ·  ');
    return `<div class="fixture-card${isNext?' next-game':''}" style="animation-delay:${i*0.04}s">
      <div class="fixture-top">
        <span class="fixture-date">${dateStr}</span>
        ${isNext ? '<span class="fixture-badge next">Next Game</span>' : (f.round ? '<span class="fixture-badge">'+f.round+'</span>' : '')}
      </div>
      <div class="fixture-teams">
        <div class="fixture-team"><div class="fixture-team-label">Home</div><div class="fixture-team-name">${leftName}</div></div>
        <div class="fixture-vs">VS</div>
        <div class="fixture-team" style="text-align:right"><div class="fixture-team-label">Away</div><div class="fixture-team-name">${rightName}</div></div>
      </div>
      ${timeInfo ? `<div style="font-size:12px;font-weight:700;color:rgba(255,255,255,0.6);margin-bottom:8px;">${timeInfo}</div>` : ''}
      ${venue ? `<div class="fixture-pills">
        <div class="fixture-pill clickable" onclick="window.open('${mapsUrl}','_blank')">
          <span class="fixture-pill-icon">📍</span><span class="fixture-pill-text">${venue}</span>
        </div>
        ${f.fruit ? `<div class="fixture-pill"><span class="fixture-pill-icon">🍊</span><span class="fixture-pill-text">${f.fruit}</span></div>` : ''}
        ${f.linesman ? `<div class="fixture-pill"><span class="fixture-pill-icon">🚩</span><span class="fixture-pill-text">${f.linesman}</span></div>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');
}

// ============================================================
// RESULTS
// ============================================================
function renderResults() {
  const list = document.getElementById('resultsList');
  if (!cachedResults) { list.innerHTML = '<div class="loading-state"><div class="spinner"></div>Loading…</div>'; return; }
  if (!cachedResults.length) { list.innerHTML = '<div class="empty-state"><div class="empty-icon">🏆</div><p>No results yet.</p></div>'; return; }
  const reversed = cachedResults.slice().reverse();
  list.innerHTML = reversed.map((r, ri) => {
    const our   = r.ourScore   !== '' ? parseInt(r.ourScore)   || 0 : 0;
    const their = r.theirScore !== '' ? parseInt(r.theirScore) || 0 : 0;
    let outcome = 'draw', label = 'Draw';
    if (our > their) { outcome = 'win'; label = 'Win'; }
    if (our < their) { outcome = 'loss'; label = 'Loss'; }
    let dateStr = r.date || '';
    try { if (dateStr) dateStr = formatDate(dateStr, {weekday:'short', day:'numeric', month:'short', year:'numeric'}); } catch(e) {}
    const ourColor = outcome==='win' ? 'var(--green)' : outcome==='loss' ? '#ff453a' : 'var(--white)';
    return `<div class="result-card" style="animation-delay:${ri*0.04}s">
      <div class="result-header">
        <span class="result-date">${dateStr}</span>
        <span class="outcome-badge outcome-${outcome}">${label}</span>
      </div>
      <div class="result-score-row">
        <div class="result-team"><div class="result-team-name">Eltham Redbacks</div><div class="result-score-num" style="color:${ourColor}">${our}</div></div>
        <div class="result-vs-dash">—</div>
        <div class="result-team"><div class="result-team-name">${r.opponent||'—'}</div><div class="result-score-num">${their}</div></div>
      </div>
      ${buildScorerLine(r.scorers)}
    </div>`;
  }).join('');
}

function buildScorerLine(s) {
  if (!s) return '';
  try {
    const gs = [];
    s.split('|').forEach(part => {
      const b = part.split(':');
      if (b.length < 2) return;
      const g = parseInt(b[1]) || 0;
      if (g > 0) gs.push(g > 1 ? b[0].trim().split(' ')[0] + ' x' + g : b[0].trim().split(' ')[0]);
    });
    if (!gs.length) return '';
    return '<div class="scorer-line"><span class="scorer-goals">⚽ ' + gs.join(', ') + '</span></div>';
  } catch(e) { return ''; }
}

// ============================================================
// STATS
// ============================================================
function sortStats(by) {
  currentSort = by;
  ['goals','assists','name'].forEach(s => document.getElementById('sort-'+s).classList.toggle('active', s===by));
  renderStats();
}
function renderStats() {
  const list = document.getElementById('statsList');
  if (!players.length) { list.innerHTML = '<div class="empty-state"><div class="empty-icon">🏅</div><p>No players loaded yet.</p></div>'; return; }
  const sorted = players.map(p => ({ name:p.name, goals:p.goals, assists:p.assists }));
  if (currentSort==='goals')   sorted.sort((a,b) => b.goals-a.goals || b.assists-a.assists);
  if (currentSort==='assists') sorted.sort((a,b) => b.assists-a.assists || b.goals-a.goals);
  if (currentSort==='name')    sorted.sort((a,b) => a.name.localeCompare(b.name));
  list.innerHTML = sorted.map((p, i) => {
    const initials = p.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const rc = i===0?'rank-gold':i===1?'rank-silver':i===2?'rank-bronze':'';
    const rl = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
    return `<div class="stats-card" style="animation-delay:${i*0.03}s">
      <div class="stats-rank ${rc}">${rl}</div>
      <div class="stats-avatar">${initials}</div>
      <div class="stats-info">
        <div class="stats-name">${p.name}</div>
        <div class="stats-sub"><span class="sg">⚽ ${p.goals} goal${p.goals!==1?'s':''}</span> · <span class="sa">★ ${p.assists} assist${p.assists!==1?'s':''}</span></div>
      </div>
      <div class="stats-nums">
        <div class="stats-num-item"><div class="stats-big goals-num">${p.goals}</div><div class="stats-num-label">Goals</div></div>
        <div class="stats-num-item"><div class="stats-big assists-num">${p.assists}</div><div class="stats-num-label">Assists</div></div>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// UTILS
// ============================================================
function jsonp(url, callback) {
  const fn = '_gs_' + Math.random().toString(36).slice(2);
  const script = document.createElement('script');
  let done = false;
  const timer = setTimeout(() => { if(done)return; done=true; cleanup(); callback(null); }, 15000);
  window[fn] = function(data) { if(done)return; done=true; cleanup(); callback(data); };
  function cleanup() { clearTimeout(timer); delete window[fn]; if(script.parentNode) script.parentNode.removeChild(script); }
  script.src = url + (url.includes('?')?'&':'?') + 'callback=' + fn;
  script.onerror = () => { if(done)return; done=true; cleanup(); callback(null); };
  document.head.appendChild(script);
}

function formatDate(dateStr, options) {
  if (!dateStr || typeof dateStr !== 'string') return dateStr;
  const iso = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!iso) return dateStr;
  const year=parseInt(iso[1],10), month=parseInt(iso[2],10), day=parseInt(iso[3],10);
  const months     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthsFull = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const weekdays   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const weekdaysFull = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const t = [0,3,2,5,0,3,5,1,4,6,2,4];
  let y = year; if (month < 3) y--;
  const dow = (y + Math.floor(y/4) - Math.floor(y/100) + Math.floor(y/400) + t[month-1] + day) % 7;
  let parts = [];
  if (options.weekday) parts.push(options.weekday==='short' ? weekdays[dow] : weekdaysFull[dow]);
  if (options.day)     parts.push(day);
  if (options.month)   parts.push(options.month==='short' ? months[month-1] : monthsFull[month-1]);
  if (options.year)    parts.push(year);
  return parts.join(' ');
}

let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (type ? ' '+type : '');
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

init();
</script>
